<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {%- if title -%}{{ title }}
  {%- elsif page.title -%}{{ page.title }}
  {%- else -%}{{ site.title }}
  {%- endif -%}
</title>

<meta name="description" content="{{ site.description }}">
<meta name="color-scheme" content="light dark">
<meta name="fediverse:creator" content="@brajeshwar@margins.oinam.com">

<!-- No-flash: apply the reader's saved mode + palette + font + accent before first paint. -->
<script>(function(){try{var d=document.documentElement,g=localStorage,t=g.getItem('theme'),p=g.getItem('palette'),f=g.getItem('font'),a=g.getItem('accent');d.dataset.theme=(t==='light'||t==='dark')?t:'auto';if(p&&p!=='default')d.dataset.palette=p;if(f&&f!=='sans')d.dataset.font=f;if(a){d.style.setProperty('--ov-accent',a);d.dataset.accent='custom';}}catch(e){}})();</script>

<link rel="archives" href="{{ site.baseurl | prepend: site.url }}/archives/">
<link rel="canonical" href="{{ site.baseurl | prepend: site.url }}{{ page.url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl | prepend: site.url }}/feed.xml">

<style type="text/css">{% include styles.html %}</style>
<link rel="stylesheet" href="{{ '/assets/print.css' | relative_url }}" media="print">
<script defer src="{{ '/assets/scripts/appearance.js' | relative_url }}"></script>
<script defer src="{{ '/assets/scripts/sidenotes.js' | relative_url }}"></script>
<script defer src="{{ '/assets/scripts/search.js' | relative_url }}"></script>
<script defer src="https://analytics.oinam.net/script.js" data-website-id="7cc63f26-aabf-4814-88c9-9c3e29f1c783"></script>

</head>
<body>
  
  {% include header.html %}
  {{ content }}
  {% include footer.html %}

</body>
</html>
